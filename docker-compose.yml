services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: atlas-verde-postgis
    environment:
      POSTGRES_DB: atlas_verde
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev
    ports:
      - "5432:5432"
    volumes:
      - atlas_verde_postgis:/var/lib/postgresql/data

volumes:
  atlas_verde_postgis:
